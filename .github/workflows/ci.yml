name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'cs/v*'
      - 'cpp/v*'
      - 'rust/v*'
      - 'zig/v*'
  pull_request:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      if: github.ref_type != 'tag'
      id: filter
      with:
        filters: |
          cs:
            - 'cs/**'
            - 'test/**'
          cpp:
            - 'cpp/**'
            - 'test/**'
          rust:
            - 'rust/**'
            - 'test/**'
          zig:
            - 'zig/**'
            - 'test/**'
    - id: matrix
      shell: pwsh
      run: |
        $all = @(
          @{component='cs'; display='C#'; setup='dotnet'}
          @{component='cpp'; display='C++'; setup='zig'}
          @{component='rust'; display='Rust'; setup='rust'}
          @{component='zig'; display='Zig'; setup='zig'}
        )
        if ('${{ github.ref_type }}' -eq 'tag') {
          $tag = '${{ github.ref_name }}'
          $c = $all | Where-Object { $tag -like "$($_.component)/v*" }
          if (-not $c) { throw "Unsupported tag: $tag" }
          $ver = $tag -replace '^[^/]+/v?', ''
          $filtered = $c | ForEach-Object { $_ | Select-Object *, @{N='version';E={$ver}} }
        } elseif ('${{ github.event_name }}' -eq 'workflow_dispatch') {
          $filtered = $all
        } else {
          $changes = '${{ steps.filter.outputs.changes }}' | ConvertFrom-Json
          $filtered = $all | Where-Object { $changes -contains $_.component }
        }
        if (-not $filtered) { $filtered = @() }
        echo "value=$($filtered | ConvertTo-Json -Compress -AsArray)" >> $env:GITHUB_OUTPUT

  build:
    permissions:
      contents: write
    needs: detect
    if: needs.detect.outputs.matrix != '' && needs.detect.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.matrix) }}
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-tags: true
    - name: Setup .NET
      if: matrix.setup == 'dotnet'
      uses: actions/setup-dotnet@v5
    - name: Setup Zig
      if: matrix.setup == 'zig'
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0
    - name: Setup Rust
      if: matrix.setup == 'rust'
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-pc-windows-msvc
    - name: Build ${{ matrix.component }}
      shell: pwsh
      run: .\${{ matrix.component }}\build.ps1
    - name: Test ${{ matrix.component }} (x86)
      shell: pwsh
      run: .\test\run-tests.ps1 -ShimExe ".\${{ matrix.component }}\bin\x86\shim.exe"
    - name: Test ${{ matrix.component }} (x64)
      shell: pwsh
      run: .\test\run-tests.ps1 -ShimExe ".\${{ matrix.component }}\bin\x64\shim.exe"

    # Release steps (tag push only)
    - name: Package ${{ matrix.component }}
      if: github.ref_type == 'tag'
      shell: pwsh
      run: |
        $dist = "${{ matrix.component }}\dist"
        Remove-Item $dist -Recurse -Force -ErrorAction SilentlyContinue
        New-Item $dist -ItemType Directory -Force | Out-Null
        foreach ($t in @('x86','x64','arm64')) {
          $tmp = Join-Path $env:TEMP "shim-release-$t"
          Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue
          New-Item $tmp -ItemType Directory -Force | Out-Null
          $exe = "${{ matrix.component }}\bin\$t\shim.exe"
          Copy-Item $exe "$tmp\shim.exe"
          Copy-Item "${{ matrix.component }}\version" "$tmp\version" -ErrorAction SilentlyContinue
          $sha256 = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$sha256  shim.exe" | Out-File "$tmp\shim.exe.sha256" -Encoding ascii
          $sha512 = (Get-FileHash $exe -Algorithm SHA512).Hash.ToLower()
          "$sha512  shim.exe" | Out-File "$tmp\shim.exe.sha512" -Encoding ascii
          Compress-Archive -Path "$tmp\*" -DestinationPath "$dist\shim-$t.zip" -Force
        }
    - name: Resolve fromTag
      if: github.ref_type == 'tag'
      id: fromtag
      shell: pwsh
      run: |
        $tags = git tag --list "${{ matrix.component }}/v*" | ForEach-Object { $_ -replace '^[^/]+/v', '' } | Where-Object { $_ -match '^\d+\.\d+\.\d+$' }
        $ver = "${{ matrix.version }}"
        $sorted = $tags | Sort-Object { [version]$_ }
        $i = [array]::IndexOf($sorted, $ver)
        if ($i -gt 0) {
          $prev = "${{ matrix.component }}/v$($sorted[$i-1])"
          echo "tag=$prev" >> $env:GITHUB_OUTPUT
        }
    - name: Build Changelog
      id: changelog
      if: github.ref_type == 'tag'
      uses: mikepenz/release-changelog-builder-action@v6
      with:
        mode: "HYBRID"
        fromTag: ${{ steps.fromtag.outputs.tag }}
        configurationJson: >
          {
            "tag_resolver": {
              "method": "semver",
              "transformer": { "pattern": "${{ matrix.component }}/v(.+)", "target": "$1" }
            },
            "template": "#{{CHANGELOG}}",
            "empty_template": "",
            "categories": [
              { "title": "## 🚀 Features", "labels": ["feat"] },
              { "title": "## 🐛 Fixes", "labels": ["fix"] },
              { "title": "## ⚡ Performance", "labels": ["perf"] },
              { "title": "## ♻️ Refactoring", "labels": ["refactor", "style"] },
              { "title": "## 📝 Documentation", "labels": ["docs"] },
              { "title": "## 🔧 Maintenance", "labels": ["build", "ci", "chore"] },
              { "title": "## 🧪 Testing", "labels": ["test"] },
              { "title": "## Other", "labels": [] }
            ],
            "label_extractor": [
              {
                "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([^)]*\\))?(!)?: .+",
                "on_property": "title",
                "target": "$1"
              }
            ],
            "pr_template": "- #{{TITLE}} (#{{NUMBER}})",
            "commit_template": "- #{{TITLE}} (#{{MERGE_SHA}})"
          }
        includeOnlyPaths: |
          ${{ matrix.component }}/
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Release
      if: github.ref_type == 'tag'
      id: release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ matrix.component }}/dist/*.zip
        name: ${{ matrix.display }} Shim v${{ matrix.version }}
        body: ${{ steps.changelog.outputs.changelog }}
        fail_on_unmatched_files: true
    - name: VirusTotal Scan
      if: github.ref_type == 'tag'
      uses: cssnr/virustotal-action@v2
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        file_globs: ${{ matrix.component }}/dist/*.zip
        release_id: ${{ steps.release.outputs.id }}
        update_release: true
        collapsed: true
        sha256: true
        file_name: name
        release_heading: "## 🛡️ VirusTotal Scan"